name: Build JSQ.exe

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile
        run: |
          $env:PATH = "C:\ProgramData\Chocolatey\lib\mingw\tools\install\mingw64\bin;" + $env:PATH
          g++ JSQ.cpp -o JSQ.exe -mwindows -lwinmm -municode -std=c++17

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: JSQ-exe
          path: JSQ.exe
