name: Build JSQ.exe

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc

      - name: Compile
        shell: msys2 {0}
        run: g++ JSQ.cpp -o JSQ.exe -mwindows -lwinmm -municode -std=c++17

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JSQ-exe
          path: JSQ.exe
